<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Wallet Deposit - BikeExchange</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: monospace;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
            display: block;
        }
        .result.error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
            display: block;
        }
        .result pre {
            margin-top: 10px;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
        }
        .info-box {
            background: #e7f3ff;
            border: 2px solid #b3d9ff;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #004085;
        }
        .info-box strong {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .quick-btn {
            padding: 8px;
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Test Wallet Deposit</h1>
        <p class="subtitle">Nạp điểm vào ví BikeExchange</p>

        <div class="info-box">
            <strong>📌 Hướng dẫn:</strong>
            1. Lấy token từ localStorage sau khi login<br>
            2. Nhập token vào form bên dưới<br>
            3. Chọn số điểm muốn nạp<br>
            4. Click "Nạp điểm" và kiểm tra kết quả
        </div>

        <form id="depositForm">
            <div class="form-group">
                <label for="token">🔑 Token (Bearer Token)</label>
                <textarea id="token" placeholder="Paste token từ localStorage.getItem('token')" required></textarea>
            </div>

            <div class="form-group">
                <label for="amount">💵 Số điểm muốn nạp</label>
                <input type="number" id="amount" value="1000" min="1" required>
                <div class="quick-amounts">
                    <button type="button" class="quick-btn" onclick="setAmount(100)">100</button>
                    <button type="button" class="quick-btn" onclick="setAmount(500)">500</button>
                    <button type="button" class="quick-btn" onclick="setAmount(1000)">1,000</button>
                    <button type="button" class="quick-btn" onclick="setAmount(5000)">5,000</button>
                </div>
            </div>

            <div class="form-group">
                <label for="referenceId">📝 Reference ID (tùy chọn)</label>
                <input type="text" id="referenceId" placeholder="Tự động tạo nếu để trống">
            </div>

            <button type="submit" class="btn" id="submitBtn">
                🚀 Nạp điểm
            </button>
        </form>

        <div id="result" class="result"></div>
    </div>

    <script>
        const API_URL = 'https://bikeexchange-be.onrender.com/api/wallet/deposit';

        function setAmount(value) {
            document.getElementById('amount').value = value;
        }

        document.getElementById('depositForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = document.getElementById('token').value.trim();
            const amount = parseInt(document.getElementById('amount').value);
            let referenceId = document.getElementById('referenceId').value.trim();

            if (!referenceId) {
                referenceId = 'DEPOSIT_' + Date.now();
            }

            const submitBtn = document.getElementById('submitBtn');
            const resultDiv = document.getElementById('result');

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Đang xử lý...';
            resultDiv.className = 'result';
            resultDiv.style.display = 'none';

            try {
                console.log('🚀 Sending deposit request...');
                console.log('Amount:', amount);
                console.log('Reference ID:', referenceId);

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        amount: amount,
                        referenceId: referenceId
                    })
                });

                const data = await response.json();
                console.log('📦 Response:', data);

                if (response.ok && data.success !== false) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <strong>✅ Nạp điểm thành công!</strong><br>
                        💰 Số dư mới: <strong>${data.data?.availablePoints || data.availablePoints || 'N/A'}</strong> điểm<br>
                        🔒 Điểm đóng băng: <strong>${data.data?.frozenPoints || data.frozenPoints || 0}</strong> điểm<br>
                        📝 Reference: ${referenceId}
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    throw new Error(data.message || 'Deposit failed');
                }
            } catch (error) {
                console.error('❌ Error:', error);
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <strong>❌ Lỗi khi nạp điểm</strong><br>
                    ${error.message}
                    <pre>${error.stack || ''}</pre>
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Nạp điểm';
            }
        });

        // Auto-fill token from localStorage if available
        window.addEventListener('load', () => {
            try {
                const savedToken = localStorage.getItem('token');
                if (savedToken) {
                    document.getElementById('token').value = savedToken;
                    console.log('✅ Auto-filled token from localStorage');
                }
            } catch (e) {
                console.log('ℹ️ No token in localStorage');
            }
        });
    </script>
</body>
</html>
